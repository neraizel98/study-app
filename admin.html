<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d1117">
    <title>관리자 대시보드 - Smart Study</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <style>
        body { display:flex; flex-direction:column; align-items:center; min-height:100vh; padding-bottom:60px; }
        .wrap { width:100%; max-width:960px; padding:20px; }

        /* ── Header ── */
        .page-header { display:flex; align-items:center; gap:12px; margin-bottom:28px; padding-top:10px; }
        .back-btn { text-decoration:none; color:var(--text-sub); font-size:0.85rem; background:var(--card-bg); border:1px solid var(--card-border); padding:6px 14px; border-radius:20px; transition:color 0.2s, border-color 0.2s; }
        .back-btn:hover { color:var(--accent); border-color:var(--accent); }
        .page-title { font-size:1.5rem; font-weight:700; flex:1; }

        /* ── Section title ── */
        .section-title { font-size:1rem; font-weight:700; color:var(--text-sub); margin-bottom:14px; letter-spacing:0.5px; }

        /* ── User cards (list view) ── */
        .user-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(260px,1fr)); gap:16px; }
        .user-card {
            background:var(--card-bg); border:1px solid var(--card-border);
            border-radius:20px; padding:20px; cursor:pointer;
            transition:border-color 0.2s, transform 0.2s;
            text-decoration:none; color:inherit;
        }
        .user-card:hover { border-color:var(--accent); transform:translateY(-3px); }
        .user-card-top { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
        .user-avatar {
            width:44px; height:44px; border-radius:14px;
            background:linear-gradient(135deg, var(--accent), var(--accent2));
            display:flex; align-items:center; justify-content:center;
            font-size:1.3rem; font-weight:700; color:#fff; flex-shrink:0;
        }
        .user-name { font-size:1.1rem; font-weight:700; }
        .user-level { font-size:0.78rem; color:var(--text-sub); margin-top:2px; }
        .user-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
        .u-stat { text-align:center; background:rgba(255,255,255,0.04); border-radius:10px; padding:8px 4px; }
        .u-stat-val { font-size:1rem; font-weight:700; }
        .u-stat-lbl { font-size:0.65rem; color:var(--text-sub); margin-top:2px; }
        .user-last { font-size:0.74rem; color:var(--text-sub); margin-top:12px; border-top:1px solid rgba(255,255,255,0.06); padding-top:10px; }

        /* ── Detail view ── */
        #userDetailView { display:none; }
        .detail-back { display:inline-flex; align-items:center; gap:6px; background:var(--card-bg); border:1px solid var(--card-border); border-radius:20px; padding:7px 16px; cursor:pointer; font-size:0.85rem; color:var(--text-sub); margin-bottom:20px; transition:color 0.2s; }
        .detail-back:hover { color:var(--accent); border-color:var(--accent); }

        /* detail header */
        .detail-header { display:flex; align-items:center; gap:16px; margin-bottom:24px; }
        .detail-avatar { width:56px; height:56px; border-radius:18px; background:linear-gradient(135deg, var(--accent), var(--accent2)); display:flex; align-items:center; justify-content:center; font-size:1.6rem; font-weight:700; color:#fff; flex-shrink:0; }
        .detail-name { font-size:1.4rem; font-weight:700; }
        .detail-sub  { font-size:0.85rem; color:var(--text-sub); margin-top:3px; }

        /* summary cards row */
        .detail-summary { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px; }
        .ds-card { background:var(--card-bg); border:1px solid var(--card-border); border-radius:16px; padding:16px 12px; text-align:center; }
        .ds-icon  { font-size:1.4rem; margin-bottom:6px; }
        .ds-val   { font-size:1.3rem; font-weight:700; }
        .ds-lbl   { font-size:0.72rem; color:var(--text-sub); margin-top:4px; }

        /* tabs */
        .detail-tabs { display:flex; gap:8px; margin-bottom:16px; overflow-x:auto; padding-bottom:4px; scrollbar-width:none; }
        .detail-tabs::-webkit-scrollbar { display:none; }
        .d-tab { padding:7px 18px; border-radius:20px; border:1px solid var(--card-border); background:transparent; color:var(--text-sub); cursor:pointer; font-size:0.88rem; font-family:var(--font); transition:all 0.2s; }
        .d-tab:hover:not(.active) { border-color:rgba(79,172,254,0.5); color:var(--text); background:rgba(255,255,255,0.05); }
        .d-tab.active { background:rgba(79,172,254,0.15); border-color:var(--accent); color:var(--accent); font-weight:700; }

        /* chart card */
        .chart-card { background:var(--card-bg); border:1px solid var(--card-border); border-radius:20px; padding:22px 24px; margin-bottom:16px; }
        .chart-title { font-size:1rem; font-weight:700; margin-bottom:16px; }

        /* quiz records */
        .quiz-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.05); }
        .quiz-row:last-child { border-bottom:none; }
        .subj-badge { width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:0.95rem; flex-shrink:0; }
        .quiz-info { flex:1; min-width:0; }
        .quiz-level { font-size:0.82rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .quiz-date  { font-size:0.72rem; color:var(--text-sub); }
        .quiz-score { font-size:1rem; font-weight:700; flex-shrink:0; }
        .quiz-time  { font-size:0.72rem; color:var(--text-sub); flex-shrink:0; }

        /* subject stats bar */
        .subj-stat-row { display:flex; align-items:center; gap:14px; padding:12px 0; border-bottom:1px solid rgba(255,255,255,0.05); }
        .subj-stat-row:last-child { border-bottom:none; }
        .subj-stat-name { width:60px; font-weight:600; font-size:0.9rem; flex-shrink:0; }
        .subj-bar-wrap { flex:1; }
        .subj-bar-track { height:8px; background:rgba(255,255,255,0.07); border-radius:4px; overflow:hidden; }
        .subj-bar-fill  { height:100%; border-radius:4px; transition:width 0.6s; }
        .subj-stat-pct  { width:40px; text-align:right; font-size:0.85rem; font-weight:700; flex-shrink:0; }
        .subj-stat-cnt  { font-size:0.75rem; color:var(--text-sub); flex-shrink:0; }

        /* wrong items */
        .wrong-row { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.05); }
        .wrong-row:last-child { border-bottom:none; }
        .wrong-identifier { flex:1; font-size:0.88rem; }
        .wrong-count { font-size:0.78rem; color:#f9826c; background:rgba(249,130,108,0.12); padding:2px 8px; border-radius:12px; flex-shrink:0; }
        .mastered-badge { font-size:0.72rem; color:#56d364; background:rgba(86,211,100,0.12); padding:2px 8px; border-radius:12px; }

        .empty-msg { text-align:center; padding:36px; color:var(--text-sub); font-size:0.9rem; }
        .loading    { text-align:center; padding:60px; color:var(--text-sub); }
        .error-msg  { text-align:center; padding:40px; color:#f9826c; font-size:0.9rem; }

        @media (max-width:600px) {
            .detail-summary { grid-template-columns:repeat(2,1fr); }
            .user-grid { grid-template-columns:1fr; }
        }
    </style>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="wrap">
        <div class="page-header">
            <a href="index.html" class="back-btn">← 홈</a>
            <h1 class="page-title">🛠️ 관리자 대시보드</h1>
        </div>

        <!-- ── 학습 시간 설정 ── -->
        <div id="userListView">
        <div class="chart-card" id="studyTimeConfig" style="margin-bottom:20px;">
            <div class="chart-title" style="margin-bottom:14px;">⏱️ 과목별 최소 학습 시간 설정</div>
            <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:14px;" id="studyTimeInputs">
                <div style="text-align:center;">
                    <div style="font-size:0.8rem;color:var(--text-sub);margin-bottom:6px;">🇬🇧 영어</div>
                    <div style="display:flex;align-items:center;justify-content:center;gap:6px;">
                        <input type="number" id="stcEnglish" min="0" max="60" style="width:52px;padding:6px;border-radius:8px;border:1px solid var(--card-border);background:rgba(255,255,255,0.06);color:var(--text);text-align:center;font-family:var(--font);font-size:0.95rem;">
                        <span style="font-size:0.8rem;color:var(--text-sub);">분</span>
                    </div>
                </div>
                <div style="text-align:center;">
                    <div style="font-size:0.8rem;color:var(--text-sub);margin-bottom:6px;">🏮 한자</div>
                    <div style="display:flex;align-items:center;justify-content:center;gap:6px;">
                        <input type="number" id="stcHanja" min="0" max="60" style="width:52px;padding:6px;border-radius:8px;border:1px solid var(--card-border);background:rgba(255,255,255,0.06);color:var(--text);text-align:center;font-family:var(--font);font-size:0.95rem;">
                        <span style="font-size:0.8rem;color:var(--text-sub);">분</span>
                    </div>
                </div>
                <div style="text-align:center;">
                    <div style="font-size:0.8rem;color:var(--text-sub);margin-bottom:6px;">📐 수학</div>
                    <div style="display:flex;align-items:center;justify-content:center;gap:6px;">
                        <input type="number" id="stcMath" min="0" max="60" style="width:52px;padding:6px;border-radius:8px;border:1px solid var(--card-border);background:rgba(255,255,255,0.06);color:var(--text);text-align:center;font-family:var(--font);font-size:0.95rem;">
                        <span style="font-size:0.8rem;color:var(--text-sub);">분</span>
                    </div>
                </div>
            </div>
            <div style="display:flex;align-items:center;gap:10px;">
                <button onclick="saveStudyTimeConfig()" style="flex:1;padding:9px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#0d1117;font-weight:700;font-family:var(--font);cursor:pointer;">저장</button>
                <span id="stcSavedMsg" style="font-size:0.8rem;color:#56d364;display:none;">✅ 저장됨</span>
            </div>
            <div style="font-size:0.75rem;color:var(--text-sub);margin-top:8px;">0분으로 설정하면 해당 과목은 시간 제한 없이 바로 퀴즈 가능</div>
        </div>

        <!-- ── 유저 목록 ── -->
            <div class="section-title">등록된 학습자</div>
            <div id="userList" class="user-grid">
                <div class="loading">☁️ 데이터 불러오는 중...</div>
            </div>
        </div>

        <!-- ── 유저 상세 ── -->
        <div id="userDetailView">
            <button class="detail-back" id="backBtn">← 목록으로</button>
            <div id="detailContent"></div>
        </div>
    </div>

    <script src="report.js"></script>
    <script src="study-timer.js"></script>
    <script>
    // ─────────────────────────────────────────────
    //  Admin 설정
    // ─────────────────────────────────────────────
    const ADMIN_IDS = ['우준아빠'];
    const FIREBASE_CONFIG = {
        apiKey:            "AIzaSyDQBCqKxumH-NOdAETKhY6_9xGX_AsVKWg",
        authDomain:        "smart-study-wj.firebaseapp.com",
        projectId:         "smart-study-wj",
        storageBucket:     "smart-study-wj.firebasestorage.app",
        messagingSenderId: "994757323327",
        appId:             "1:994757323327:web:c0f68e95bbeea72a12e68a"
    };

    const SUBJ_NAMES  = { english:'영어', hanja:'한자', math:'수학' };
    const SUBJ_ICONS  = { english:'🇬🇧', hanja:'🏮',   math:'📐'  };
    const SUBJ_COLORS = { english:'#4facfe', hanja:'#f9826c', math:'#56d364' };

    let db = null;

    // ─────────────────────────────────────────────
    //  Firebase 초기화
    // ─────────────────────────────────────────────
    function loadScript(src) {
        return new Promise((res, rej) => {
            if (document.querySelector(`script[src="${src}"]`)) { res(); return; }
            const s = document.createElement('script');
            s.src = src; s.onload = res; s.onerror = rej;
            document.head.appendChild(s);
        });
    }

    async function initFirebase() {
        await loadScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js');
        await loadScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js');
        if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
        db = firebase.firestore();
    }

    // ─────────────────────────────────────────────
    //  데이터 로드
    // ─────────────────────────────────────────────
    async function loadAllUsers() {
        const snap = await db.collection('users').get();
        const users = [];
        snap.forEach(doc => {
            const d = doc.data();
            if (d.id) users.push({ userId: doc.id, ...d });
        });
        return users.sort((a, b) => (b._updatedAt || 0) - (a._updatedAt || 0));
    }

    async function loadUserDetail(userId) {
        const [uSnap, rSnap, wSnap] = await Promise.all([
            db.collection('users').doc(userId).get(),
            db.collection('users').doc(userId).collection('data').doc('reports').get(),
            db.collection('users').doc(userId).collection('data').doc('wrongAnswers').get()
        ]);
        return {
            userData:     uSnap.exists     ? uSnap.data()                         : {},
            reports:      rSnap.exists     ? (rSnap.data().reports || [])          : [],
            wrongAnswers: wSnap.exists     ? (wSnap.data().wrongAnswers || {})     : {}
        };
    }

    // ─────────────────────────────────────────────
    //  유저 목록 렌더링
    // ─────────────────────────────────────────────
    function renderUserList(users) {
        const el = document.getElementById('userList');
        const learners = users.filter(u => !ADMIN_IDS.includes(u.userId));

        if (!learners.length) {
            el.innerHTML = '<div class="empty-msg">등록된 학습자가 없습니다.</div>';
            return;
        }

        el.innerHTML = learners.map(u => {
            const streak = u.attendance?.currentStreak || 0;
            const lastRaw = u._updatedAt;
            const lastStr = lastRaw
                ? new Date(lastRaw).toLocaleDateString('ko-KR', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' })
                : '-';
            const initials = (u.id || u.userId || '?').slice(0, 2);
            const lvl = u.level || 1;
            const exp = u.exp || 0;

            return `
                <div class="user-card" onclick="openUserDetail('${u.userId}')">
                    <div class="user-card-top">
                        <div class="user-avatar">${initials}</div>
                        <div>
                            <div class="user-name">${u.id || u.userId}</div>
                            <div class="user-level">Lv.${lvl} · ${exp} EXP</div>
                        </div>
                    </div>
                    <div class="user-stats">
                        <div class="u-stat">
                            <div class="u-stat-val">${u.totalAttempts || 0}</div>
                            <div class="u-stat-lbl">퀴즈 횟수</div>
                        </div>
                        <div class="u-stat">
                            <div class="u-stat-val" style="color:#56d364">${streak}🔥</div>
                            <div class="u-stat-lbl">연속 출석</div>
                        </div>
                        <div class="u-stat">
                            <div class="u-stat-val">${u.totalCorrect || 0}</div>
                            <div class="u-stat-lbl">누적 정답</div>
                        </div>
                    </div>
                    <div class="user-last">마지막 활동: ${lastStr}</div>
                </div>`;
        }).join('');
    }

    // ─────────────────────────────────────────────
    //  유저 상세 렌더링
    // ─────────────────────────────────────────────
    let _currentTab = 'quiz';

    function openUserDetail(userId) {
        document.getElementById('userListView').style.display   = 'none';
        document.getElementById('userDetailView').style.display = 'block';
        document.getElementById('detailContent').innerHTML      = '<div class="loading">☁️ 불러오는 중...</div>';

        loadUserDetail(userId).then(({ userData, reports, wrongAnswers }) => {
            _currentTab = 'quiz';
            renderDetailContent(userId, userData, reports, wrongAnswers);
        }).catch(e => {
            document.getElementById('detailContent').innerHTML =
                `<div class="error-msg">⚠️ 데이터 로드 실패: ${e.message}</div>`;
        });
    }

    function renderDetailContent(userId, ud, reports, wrongAnswers) {
        const name    = ud.id || userId;
        const lvl     = ud.level || 1;
        const streak  = ud.attendance?.currentStreak || 0;
        const totalDay = ud.attendance?.totalDays || 0;
        const studyMin = Math.round((ud.totalStudyTime || 0) / 60);
        const initials = name.slice(0, 2);

        const summaryCards = [
            { icon:'🏅', val:`Lv.${lvl}`, lbl:'레벨' },
            { icon:'⏱',  val:`${studyMin}분`, lbl:'총 학습 시간' },
            { icon:'📝',  val:`${ud.totalAttempts||0}회`, lbl:'퀴즈 도전' },
            { icon:'🔥',  val:`${streak}일`, lbl:'연속 출석' },
            { icon:'🧠',  val:`${ud.totalCorrect||0}개`, lbl:'누적 정답' },
            { icon:'📅',  val:`${totalDay}일`, lbl:'총 출석' }
        ];

        const html = `
            <div class="detail-header">
                <div class="detail-avatar">${initials}</div>
                <div>
                    <div class="detail-name">${name}</div>
                    <div class="detail-sub">EXP ${ud.exp||0} · 마지막 체크인 ${ud.attendance?.lastCheckIn || '-'}</div>
                </div>
            </div>

            <div class="detail-summary" style="grid-template-columns:repeat(3,1fr)">
                ${summaryCards.map(c => `
                    <div class="ds-card">
                        <div class="ds-icon">${c.icon}</div>
                        <div class="ds-val">${c.val}</div>
                        <div class="ds-lbl">${c.lbl}</div>
                    </div>`).join('')}
            </div>

            ${buildDailyStatsBar(ud)}

            <div class="detail-tabs">
                <button class="d-tab active" data-tab="quiz"    onclick="switchTab(this,'quiz',    '${userId}')">📋 퀴즈 기록</button>
                <button class="d-tab"        data-tab="weekly"  onclick="switchTab(this,'weekly',  '${userId}')">📅 주간 통계</button>
                <button class="d-tab"        data-tab="subject" onclick="switchTab(this,'subject', '${userId}')">📊 과목별 통계</button>
                <button class="d-tab"        data-tab="level"   onclick="switchTab(this,'level',   '${userId}')">📈 레벨별 학습</button>
                <button class="d-tab"        data-tab="wrong"   onclick="switchTab(this,'wrong',   '${userId}')">📝 오답 현황</button>
            </div>

            <div class="chart-card" id="tabContent">
                ${buildQuizTab(reports)}
            </div>`;

        document.getElementById('detailContent').innerHTML = html;
        // Store data on window for tab switching
        window._adminData = { userId, ud, reports, wrongAnswers };
    }

    function switchTab(btn, tab, userId) {
        document.querySelectorAll('.d-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        _currentTab = tab;
        // 이전 차트 인스턴스 정리
        if (window._adminWeekCharts) {
            Object.values(window._adminWeekCharts).forEach(c => c && c.destroy());
            window._adminWeekCharts = {};
        }
        const { reports, wrongAnswers } = window._adminData;
        const el = document.getElementById('tabContent');
        if (tab === 'quiz')    el.innerHTML = buildQuizTab(reports);
        if (tab === 'subject') el.innerHTML = buildSubjectTab(reports);
        if (tab === 'level')   el.innerHTML = buildStudyDetailTab(reports);
        if (tab === 'wrong')   el.innerHTML = buildWrongTab(wrongAnswers);
        if (tab === 'weekly') {
            _weeklyOffset = 0;
            el.innerHTML = _weeklyHTML(reports, 0);
            requestAnimationFrame(() => _drawWeeklyCharts(reports, 0));
        }
    }

    // ── 오늘의 학습 바 ──
    function buildDailyStatsBar(ud) {
        const ds = ud.dailyStats;
        if (!ds || !ds.date) return '';

        const today = new Date().toLocaleDateString('ko-KR', { year:'numeric', month:'2-digit', day:'2-digit' }).replace(/\. /g,'-').replace('.','');
        const isToday = ds.date === today || ds.date === new Date().toISOString().slice(0,10);
        const label = isToday ? '오늘의 학습' : `${ds.date} 학습`;

        const SUBJ_ORDER = ['english','hanja','math'];
        const subjects = (ds.subjectsStudied || []).filter(s => SUBJ_ORDER.includes(s));
        if (!subjects.length) return '';

        const items = subjects.map(s => {
            const sec = ds.studyTime?.[s] || 0;
            const min = Math.floor(sec / 60);
            const rem = sec % 60;
            const timeStr = min > 0 ? `${min}분${rem ? ' '+rem+'초' : ''}` : `${sec}초`;
            return `<span style="display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.05);border-radius:10px;padding:5px 12px;font-size:0.82rem;">
                ${SUBJ_ICONS[s]} ${SUBJ_NAMES[s]} <strong style="color:${SUBJ_COLORS[s]}">${timeStr}</strong>
            </span>`;
        }).join('');

        return `<div style="background:rgba(79,172,254,0.06);border:1px solid rgba(79,172,254,0.2);border-radius:14px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
            <span style="font-size:0.78rem;font-weight:700;color:var(--text-sub);white-space:nowrap;">📅 ${label}</span>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">${items}</div>
        </div>`;
    }

    // ── 퀴즈 기록 탭 ──
    function buildQuizTab(reports) {
        if (!reports.length) return '<div class="empty-msg">퀴즈 기록이 없습니다.</div>';
        const sorted = [...reports].sort((a,b) => b.date - a.date).slice(0, 30);
        const rows = sorted.map(r => {
            const pct   = r.totalQuestions > 0 ? Math.round(r.finalScore / r.totalQuestions * 100) : 0;
            const color = pct >= 80 ? '#56d364' : pct >= 50 ? '#f9826c' : '#ff5f6d';
            const c     = SUBJ_COLORS[r.subject] || '#888';
            const d     = new Date(r.date);
            const ds    = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
            const sec   = r.timeSpentSeconds || 0;
            const timeStr = sec > 0 ? (Math.floor(sec/60) + '분 ' + (sec%60) + '초') : '-';
            const lvlShort = (r.level||'-').length > 16 ? (r.level||'-').slice(0,16)+'…' : (r.level||'-');
            const round = r.round || 1;
            const roundBadge = round <= 2
                ? `<span style="font-size:0.65rem;padding:1px 6px;border-radius:8px;background:${round===1?'rgba(79,172,254,0.15)':'rgba(249,130,108,0.15)'};color:${round===1?'#4facfe':'#f9826c'};margin-left:4px;">${round}회차</span>`
                : '';
            return `
                <div class="quiz-row">
                    <div class="subj-badge" style="background:${c}22; color:${c}">${SUBJ_ICONS[r.subject]||'📚'}</div>
                    <div class="quiz-info">
                        <div class="quiz-level">${SUBJ_NAMES[r.subject]||r.subject} · ${lvlShort}${roundBadge}</div>
                        <div class="quiz-date">${ds}</div>
                    </div>
                    <div class="quiz-score" style="color:${color}">${r.finalScore}/${r.totalQuestions}</div>
                    <div class="quiz-time">${timeStr}</div>
                </div>`;
        }).join('');
        return `<div class="chart-title">최근 퀴즈 기록 (최대 30회)</div>${rows}`;
    }

    // ── 과목별 통계 탭 ──
    function buildSubjectTab(reports) {
        const subjects = ['english', 'hanja', 'math'];
        const pct = r => r.totalQuestions > 0 ? r.finalScore / r.totalQuestions * 100 : 0;
        const avg = arr => arr.length ? Math.round(arr.reduce((a, r) => a + pct(r), 0) / arr.length) : null;

        const ROUND_LABELS = ['1회차', '2회차', '3회차+'];

        const cards = subjects.map(s => {
            const sub = reports.filter(r => r.subject === s);
            if (!sub.length) return null;

            const totalCount = sub.length;
            const totalTime  = Math.round(sub.reduce((a, r) => a + (r.timeSpentSeconds || 0), 0) / 60);
            const overallPct = avg(sub);
            const color      = SUBJ_COLORS[s];

            // 회차별 분류: 1회차, 2회차, 3회차+
            const byRound = [
                sub.filter(r => (r.round || 1) === 1),
                sub.filter(r => (r.round || 1) === 2),
                sub.filter(r => (r.round || 1) >= 3),
            ];

            const roundBars = byRound.map((arr, i) => {
                if (!arr.length) return '';
                const p = avg(arr);
                const pctColor = p >= 80 ? '#56d364' : p >= 50 ? '#f9826c' : '#ff5f6d';
                return `
                <div style="margin-bottom:10px;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
                        <span style="font-size:0.75rem;color:var(--text-sub);">${ROUND_LABELS[i]} <span style="color:var(--text-sub);opacity:0.6;">(${arr.length}회)</span></span>
                        <span style="font-size:0.82rem;font-weight:700;color:${pctColor};">${p}%</span>
                    </div>
                    <div class="subj-bar-track">
                        <div class="subj-bar-fill" style="width:${p}%;background:${pctColor};"></div>
                    </div>
                </div>`;
            }).join('');

            // 회차 간 성장 화살표
            const r1 = avg(byRound[0]), r2 = avg(byRound[1]), r3 = avg(byRound[2]);
            let growthStr = '';
            if (r1 !== null && r2 !== null) {
                const diff = r2 - r1;
                growthStr += `<span style="font-size:0.72rem;margin-right:8px;">${diff >= 0 ? '📈' : '📉'} 1→2회차 ${diff >= 0 ? '+' : ''}${diff}%p</span>`;
            }
            if (r2 !== null && r3 !== null) {
                const diff = r3 - r2;
                growthStr += `<span style="font-size:0.72rem;">${diff >= 0 ? '📈' : '📉'} 2→3회차+ ${diff >= 0 ? '+' : ''}${diff}%p</span>`;
            } else if (r1 !== null && r3 !== null) {
                const diff = r3 - r1;
                growthStr += `<span style="font-size:0.72rem;">${diff >= 0 ? '📈' : '📉'} 1→3회차+ ${diff >= 0 ? '+' : ''}${diff}%p</span>`;
            }

            return `
            <div style="background:var(--card-bg);border:1px solid var(--card-border);border-radius:16px;padding:16px 18px;margin-bottom:12px;">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
                    <div style="display:flex;align-items:center;gap:8px;">
                        <span style="font-size:1.1rem;">${SUBJ_ICONS[s]}</span>
                        <span style="font-size:1rem;font-weight:700;">${SUBJ_NAMES[s]}</span>
                    </div>
                    <div style="text-align:right;">
                        <div style="font-size:1.2rem;font-weight:700;color:${color};">${overallPct}%</div>
                        <div style="font-size:0.68rem;color:var(--text-sub);">${totalCount}회 · ${totalTime}분</div>
                    </div>
                </div>
                ${roundBars}
                ${growthStr ? `<div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.06);">${growthStr}</div>` : ''}
            </div>`;
        }).filter(Boolean);

        if (!cards.length) return '<div class="empty-msg">데이터가 없습니다.</div>';
        return `<div class="chart-title">과목별 정답률 · 회차별 분석</div>${cards.join('')}`;
    }

    // ── 레벨별 학습 탭 ──
    function buildStudyDetailTab(reports) {
        if (!reports.length) return '<div class="empty-msg">데이터가 없습니다.</div>';

        const subjects = ['english', 'hanja', 'math'];
        let html = '<div class="chart-title">레벨별 학습 현황</div>';
        let anyData = false;

        subjects.forEach(subj => {
            const subjReports = reports.filter(r => r.subject === subj);
            if (!subjReports.length) return;
            anyData = true;

            // Group by level → typeName
            const levelMap = {};
            subjReports.forEach(r => {
                const lvl = r.level || '기타';
                const type = r.typeName || '기본';
                if (!levelMap[lvl]) levelMap[lvl] = {};
                if (!levelMap[lvl][type]) levelMap[lvl][type] = { attempts: [], totalTime: 0 };
                levelMap[lvl][type].attempts.push(r);
                levelMap[lvl][type].totalTime += (r.timeSpentSeconds || 0);
            });

            const color = SUBJ_COLORS[subj];
            html += `<div style="margin-bottom:24px;">
                <div style="font-size:0.85rem;font-weight:700;color:${color};margin-bottom:12px;">${SUBJ_ICONS[subj]} ${SUBJ_NAMES[subj]}</div>`;

            Object.entries(levelMap).forEach(([level, types]) => {
                html += `<div style="margin-bottom:14px;">
                    <div style="font-size:0.78rem;font-weight:600;color:var(--text-sub);margin-bottom:6px;padding-left:4px;border-left:3px solid ${color}44;padding-left:8px;">${level}</div>`;

                Object.entries(types).forEach(([typeName, data]) => {
                    const { attempts, totalTime } = data;
                    const count = attempts.length;
                    const avgPct = Math.round(attempts.reduce((a, r) => a + (r.totalQuestions > 0 ? r.finalScore / r.totalQuestions * 100 : 0), 0) / count);
                    const bestPct = Math.round(Math.max(...attempts.map(r => r.totalQuestions > 0 ? r.finalScore / r.totalQuestions * 100 : 0)));
                    const timeMin = Math.floor(totalTime / 60);
                    const timeSec = totalTime % 60;
                    const pctColor = avgPct >= 80 ? '#56d364' : avgPct >= 50 ? '#f9826c' : '#ff5f6d';

                    // Round breakdown
                    const rounds = {};
                    attempts.forEach(r => {
                        const rnd = r.round || 1;
                        if (!rounds[rnd]) rounds[rnd] = [];
                        rounds[rnd].push(r);
                    });
                    const roundStr = Object.entries(rounds)
                        .sort((a, b) => a[0] - b[0])
                        .map(([rnd, rs]) => {
                            const rPct = Math.round(rs.reduce((a, r) => a + (r.totalQuestions > 0 ? r.finalScore / r.totalQuestions * 100 : 0), 0) / rs.length);
                            return `${rnd}회차 ${rPct}%`;
                        }).join(' · ');

                    html += `<div style="background:rgba(255,255,255,0.03);border-radius:10px;padding:10px 12px;margin-bottom:6px;">
                        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
                            <span style="font-size:0.82rem;font-weight:600;flex:1;">${typeName}</span>
                            <span style="font-size:0.73rem;color:var(--text-sub);">${count}회 · ${timeMin}분${timeSec ? ' ' + timeSec + '초' : ''}</span>
                            <span style="font-size:0.9rem;font-weight:700;color:${pctColor};">${avgPct}%</span>
                        </div>
                        <div style="height:5px;background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden;margin-bottom:5px;">
                            <div style="height:100%;width:${avgPct}%;background:${color};border-radius:3px;"></div>
                        </div>
                        <div style="font-size:0.7rem;color:var(--text-sub);">${roundStr}${bestPct !== avgPct ? ` · 최고 <span style="color:#56d364">${bestPct}%</span>` : ''}</div>
                    </div>`;
                });
                html += `</div>`;
            });
            html += `</div>`;
        });

        return anyData ? html : '<div class="empty-msg">데이터가 없습니다.</div>';
    }

    // ── 오답 현황 탭 ──
    function buildWrongTab(wrongAnswers) {
        const subjects = ['english', 'hanja', 'math'];
        let html = '<div class="chart-title">오답 현황</div>';
        let anyData = false;

        subjects.forEach(s => {
            const items = (wrongAnswers[s] || []).sort((a,b) => (b.count||0) - (a.count||0));
            if (!items.length) return;
            anyData = true;
            const mastered = items.filter(i => i.isMastered).length;
            html += `
                <div style="margin-bottom:20px;">
                    <div style="font-size:0.85rem; font-weight:700; color:${SUBJ_COLORS[s]}; margin-bottom:8px; display:flex; align-items:center; gap:8px;">
                        ${SUBJ_ICONS[s]} ${SUBJ_NAMES[s]}
                        <span style="font-size:0.72rem; font-weight:400; color:var(--text-sub);">
                            ${items.length}개 · 마스터 ${mastered}개
                        </span>
                    </div>
                    ${items.slice(0,20).map(item => {
                        const id = item.word || item.hanja || item.type || '?';
                        const meaning = item.meaning ? ` (${item.meaning})` : '';
                        return `
                            <div class="wrong-row">
                                <div class="wrong-identifier">${id}${meaning}</div>
                                <span class="wrong-count">오답 ${item.count||0}회</span>
                                ${item.isMastered ? '<span class="mastered-badge">✅ 마스터</span>' : ''}
                            </div>`;
                    }).join('')}
                </div>`;
        });

        if (!anyData) return '<div class="empty-msg">오답 데이터가 없습니다.</div>';
        return html;
    }

    // ─────────────────────────────────────────────
    //  주간 통계 탭
    // ─────────────────────────────────────────────
    let _weeklyOffset = 0;

    function _weekRange(offset) {
        const now = new Date();
        const dow = now.getDay();
        const mon = new Date(now);
        mon.setDate(now.getDate() - (dow === 0 ? 6 : dow - 1) + offset * 7);
        mon.setHours(0, 0, 0, 0);
        const sun = new Date(mon);
        sun.setDate(mon.getDate() + 6);
        sun.setHours(23, 59, 59, 999);
        return { start: mon, end: sun };
    }

    function _weeklyHTML(reports, offset) {
        const { start, end } = _weekRange(offset);
        const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;

        const wr = reports.filter(r => r.date >= start.getTime() && r.date <= end.getTime());
        const totalMin = Math.round(wr.reduce((a,r) => a + (r.timeSpentSeconds||0), 0) / 60);
        const quizCount = wr.length;
        const avgPct = quizCount > 0
            ? Math.round(wr.reduce((a,r) => a + (r.totalQuestions > 0 ? r.finalScore/r.totalQuestions*100 : 0), 0) / quizCount)
            : 0;
        const studyDays = new Set(wr.map(r => new Date(r.date).toDateString())).size;

        const weekMonth = start.getMonth() + 1;
        const weekNum   = Math.ceil(start.getDate() / 7);
        const weekLabel = offset === 0 ? '이번 주' : `${start.getFullYear()}년 ${weekMonth}월 ${weekNum}주차`;

        const summaries = [
            { icon:'⏱', val: totalMin+'분',              lbl:'학습 시간' },
            { icon:'📝', val: quizCount+'회',             lbl:'퀴즈 횟수' },
            { icon:'🎯', val: quizCount ? avgPct+'%':'-', lbl:'평균 정답률' },
            { icon:'📅', val: studyDays+'일',             lbl:'학습 일수' },
        ];

        return `
        <div style="font-size:0.95rem;font-weight:700;margin-bottom:14px;">주간 학습 통계</div>

        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
            <button onclick="window._navWeek(-1)" style="background:rgba(255,255,255,0.06);border:1px solid var(--card-border);color:var(--text-sub);padding:6px 16px;border-radius:20px;cursor:pointer;font-family:inherit;font-size:0.82rem;">← 이전</button>
            <div style="text-align:center;">
                <div style="font-size:0.92rem;font-weight:700;">${weekLabel}</div>
                <div style="font-size:0.72rem;color:var(--text-sub);margin-top:2px;">${fmt(start)} ~ ${fmt(end)}</div>
            </div>
            <button onclick="window._navWeek(1)" ${offset >= 0 ? 'disabled' : ''} style="background:rgba(255,255,255,0.06);border:1px solid var(--card-border);color:${offset >= 0 ? 'rgba(255,255,255,0.15)' : 'var(--text-sub)'};padding:6px 16px;border-radius:20px;cursor:${offset >= 0 ? 'default' : 'pointer'};font-family:inherit;font-size:0.82rem;">다음 →</button>
        </div>

        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;">
            ${summaries.map(c => `
            <div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:12px 6px;text-align:center;">
                <div style="font-size:1.05rem;margin-bottom:4px;">${c.icon}</div>
                <div style="font-size:0.95rem;font-weight:700;">${c.val}</div>
                <div style="font-size:0.62rem;color:var(--text-sub);margin-top:3px;">${c.lbl}</div>
            </div>`).join('')}
        </div>

        <div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:16px;margin-bottom:12px;">
            <div style="font-size:0.82rem;font-weight:700;margin-bottom:12px;">일별 학습 시간 (분)</div>
            <canvas id="adminChartDaily" height="150"></canvas>
        </div>

        <div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:16px;">
            <div style="font-size:0.82rem;font-weight:700;margin-bottom:12px;">8주 정답률 추이</div>
            <canvas id="adminChartTrend" height="150"></canvas>
        </div>`;
    }

    function _drawWeeklyCharts(reports, offset) {
        if (window._adminWeekCharts) {
            Object.values(window._adminWeekCharts).forEach(c => c && c.destroy());
        }
        window._adminWeekCharts = {};

        const SUBJ   = ['english','hanja','math'];
        const NAMES  = { english:'영어', hanja:'한자', math:'수학' };
        const COLORS = { english:'#4facfe', hanja:'#f9826c', math:'#56d364' };
        const FILL   = { english:'rgba(79,172,254,0.75)', hanja:'rgba(249,130,108,0.75)', math:'rgba(86,211,100,0.75)' };
        const gridColor = 'rgba(255,255,255,0.06)';
        const tickColor = '#8b949e';
        const fontCfg   = { family:'Outfit', size:11 };

        // ── Chart 1: 일별 학습 시간 (stacked bar) ──
        const { start, end } = _weekRange(offset);
        const wr = reports.filter(r => r.date >= start.getTime() && r.date <= end.getTime());

        const dailyMin = {};
        SUBJ.forEach(s => { dailyMin[s] = [0,0,0,0,0,0,0]; });
        wr.forEach(r => {
            const dow = new Date(r.date).getDay();
            const idx = dow === 0 ? 6 : dow - 1;
            if (dailyMin[r.subject]) dailyMin[r.subject][idx] += Math.round((r.timeSpentSeconds||0) / 60);
        });

        const ctx1 = document.getElementById('adminChartDaily')?.getContext('2d');
        if (ctx1) {
            window._adminWeekCharts.daily = new Chart(ctx1, {
                type: 'bar',
                data: {
                    labels: ['월','화','수','목','금','토','일'],
                    datasets: SUBJ.map(s => ({
                        label: NAMES[s], data: dailyMin[s],
                        backgroundColor: FILL[s], borderRadius: 4, borderSkipped: false,
                    }))
                },
                options: {
                    responsive: true, maintainAspectRatio: true,
                    plugins: { legend: { labels: { color: tickColor, font: fontCfg, boxWidth: 12 } } },
                    scales: {
                        x: { stacked: true, ticks: { color: tickColor, font: fontCfg }, grid: { color: gridColor } },
                        y: { stacked: true, ticks: { color: tickColor, font: fontCfg }, grid: { color: gridColor },
                             title: { display: true, text: '분', color: tickColor, font: fontCfg } }
                    }
                }
            });
        }

        // ── Chart 2: 8주 정답률 추이 (line) ──
        const weekLabels = [];
        const trendData  = {};
        SUBJ.forEach(s => { trendData[s] = []; });

        for (let i = -7; i <= 0; i++) {
            const { start: ws, end: we } = _weekRange(offset + i);
            weekLabels.push(`${ws.getMonth()+1}/${ws.getDate()}`);
            SUBJ.forEach(s => {
                const sr = reports.filter(r => r.subject === s && r.date >= ws.getTime() && r.date <= we.getTime());
                const avg = sr.length > 0
                    ? Math.round(sr.reduce((a,r) => a + (r.totalQuestions>0 ? r.finalScore/r.totalQuestions*100 : 0), 0) / sr.length)
                    : null;
                trendData[s].push(avg);
            });
        }

        const ctx2 = document.getElementById('adminChartTrend')?.getContext('2d');
        if (ctx2) {
            window._adminWeekCharts.trend = new Chart(ctx2, {
                type: 'line',
                data: {
                    labels: weekLabels,
                    datasets: SUBJ.map(s => ({
                        label: NAMES[s], data: trendData[s],
                        borderColor: COLORS[s], backgroundColor: COLORS[s]+'22',
                        fill: false, tension: 0.35, spanGaps: true,
                        pointRadius: 4, pointBackgroundColor: COLORS[s],
                    }))
                },
                options: {
                    responsive: true, maintainAspectRatio: true,
                    plugins: { legend: { labels: { color: tickColor, font: fontCfg, boxWidth: 12 } } },
                    scales: {
                        x: { ticks: { color: tickColor, font: fontCfg }, grid: { color: gridColor } },
                        y: { min: 0, max: 100,
                             ticks: { color: tickColor, font: fontCfg, callback: v => v+'%' },
                             grid: { color: gridColor } }
                    }
                }
            });
        }
    }

    window.switchTab = switchTab;

    window._navWeek = function(delta) {
        const next = _weeklyOffset + delta;
        if (next > 0) return;
        _weeklyOffset = next;
        const { reports } = window._adminData;
        const el = document.getElementById('tabContent');
        if (!el) return;
        el.innerHTML = _weeklyHTML(reports, _weeklyOffset);
        requestAnimationFrame(() => _drawWeeklyCharts(reports, _weeklyOffset));
    };

    // ─────────────────────────────────────────────
    //  이벤트
    // ─────────────────────────────────────────────
    document.getElementById('backBtn').addEventListener('click', () => {
        document.getElementById('userDetailView').style.display = 'none';
        document.getElementById('userListView').style.display   = 'block';
    });

    // ─────────────────────────────────────────────
    //  초기화
    // ─────────────────────────────────────────────
    // ─────────────────────────────────────────────
    //  학습 시간 설정 저장/로드
    // ─────────────────────────────────────────────
    function loadStudyTimeConfig() {
        const cfg = StudyTimer.getConfig();
        document.getElementById('stcEnglish').value = cfg.english ?? 5;
        document.getElementById('stcHanja').value   = cfg.hanja   ?? 5;
        document.getElementById('stcMath').value    = cfg.math    ?? 5;
    }

    function saveStudyTimeConfig() {
        const cfg = {
            english: parseInt(document.getElementById('stcEnglish').value, 10) || 0,
            hanja:   parseInt(document.getElementById('stcHanja').value,   10) || 0,
            math:    parseInt(document.getElementById('stcMath').value,    10) || 0,
        };
        StudyTimer.setConfig(cfg);
        const msg = document.getElementById('stcSavedMsg');
        msg.style.display = 'inline';
        setTimeout(() => { msg.style.display = 'none'; }, 2000);
    }
    window.saveStudyTimeConfig = saveStudyTimeConfig;

    document.addEventListener('DOMContentLoaded', async () => {
        const me = typeof UserSession !== 'undefined' ? UserSession.getActiveUser() : null;
        if (!me || !ADMIN_IDS.includes(me)) {
            document.querySelector('.wrap').innerHTML = `
                <div style="text-align:center; padding:80px 20px; color:var(--text-sub);">
                    🔒 관리자 전용 페이지입니다.<br>
                    <a href="index.html" style="color:var(--accent); text-decoration:none; margin-top:20px; display:inline-block;">← 홈으로</a>
                </div>`;
            return;
        }

        loadStudyTimeConfig();

        try {
            await initFirebase();
            const users = await loadAllUsers();
            renderUserList(users);
        } catch(e) {
            document.getElementById('userList').innerHTML =
                `<div class="error-msg">⚠️ Firebase 연결 실패: ${e.message}</div>`;
        }
    });
    </script>
<script src="version-check.js"></script>
</body>
</html>
