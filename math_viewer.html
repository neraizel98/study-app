<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- PWA: 홈 화면 추가 지원 (iOS + Android) -->
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="스마트학습">
    <link rel="apple-touch-icon" href="icons/icon-152.png">
    <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png">
    <meta name="theme-color" content="#0d1117">
    <title>Math Viewer - 원리 학습</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- KaTeX for math rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <style>
        :root {
            --math-primary: #00c853;
            --math-secondary: #00e676;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            font-family: var(--font);
            overflow-y: auto;
            position: relative;
        }

        /* 배경 Blobs */
        .bg-blobs {
            position: fixed;
            inset: 0;
            filter: blur(80px);
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .viewer-container {
            max-width: 750px;
            margin: 0 auto;
            padding: 40px 20px 100px;
            position: relative;
            z-index: 1;
        }

        .viewer-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 20px;
            margin-bottom: 50px;
            padding-bottom: 30px;
            border-bottom: 1px solid var(--card-border);
        }

        .btn-back {
            align-self: flex-start;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 10px 18px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-sub);
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }

        .btn-back:hover {
            color: var(--text);
            border-color: var(--text-sub);
            transform: translateX(-3px);
        }

        .chapter-info h2 {
            margin: 10px 0 0;
            color: var(--text);
            font-size: 2.2rem;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #00c853, #00f2fe);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .chapter-info p {
            margin: 0;
            color: var(--math-primary);
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
        }

        /* Principle Card */
        .principle-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 35px;
            padding: 45px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            margin-bottom: 40px;
            border: 1px solid var(--card-border);
            animation: fadeIn 0.8s ease-out;
        }

        .principle-header {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--math-primary);
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .principle-text {
            font-size: 1.25rem;
            line-height: 1.7;
            color: var(--text);
            background: rgba(255, 255, 255, 0.03);
            border-left: 5px solid var(--math-primary);
            padding: 25px;
            border-radius: 0 20px 20px 0;
            margin-bottom: 40px;
        }

        .explanation-section {
            margin: 40px 0;
            border-top: 1px solid var(--card-border);
            padding-top: 40px;
        }

        .detail-item {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            font-size: 1.05rem;
            line-height: 1.6;
            color: var(--text-sub);
        }

        .detail-bullet {
            width: 10px;
            height: 10px;
            background: var(--math-primary);
            border-radius: 3px;
            margin-top: 7px;
            flex-shrink: 0;
            box-shadow: 0 0 10px rgba(0, 200, 83, 0.5);
        }

        .steps-container {
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .step-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border);
            border-radius: 22px;
            padding: 25px;
            display: flex;
            align-items: flex-start;
            gap: 20px;
            transition: all 0.25s;
        }

        .step-box:hover {
            transform: scale(1.02);
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--math-primary);
        }

        .step-num {
            background: var(--math-primary);
            color: #0d1117;
            min-width: 32px;
            height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.9rem;
        }

        .step-content { flex: 1; }

        .step-formula {
            font-size: 1.4rem;
            margin-top: 12px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            display: inline-block;
            border: 1px solid var(--card-border);
        }

        .example-section {
            background: linear-gradient(135deg, rgba(0, 200, 83, 0.05), rgba(26, 35, 126, 0.1));
            backdrop-filter: blur(20px);
            color: white;
            border-radius: 35px;
            padding: 45px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            margin-top: 50px;
            border: 1px solid var(--card-border);
        }

        .example-header {
            color: var(--math-primary);
            font-weight: 800;
            font-size: 1.3rem;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .example-problem {
            font-size: 1.2rem;
            line-height: 1.7;
            color: var(--text);
            margin-bottom: 30px;
            padding-bottom: 25px;
            border-bottom: 1px solid var(--card-border);
        }

        .solution-list { display: flex; flex-direction: column; gap: 12px; }

        .solution-item {
            font-size: 1.05rem;
            color: var(--text-sub);
            background: rgba(255,255,255,0.03);
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid var(--card-border);
        }

        .concept-image-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 25px;
            margin: 30px 0;
            padding: 30px;
            text-align: center;
            border: 1px solid var(--card-border);
        }

        .concept-image {
            max-width: 100%;
            max-height: 350px;
            border-radius: 15px;
            filter: drop-shadow(0 0 20px rgba(0, 200, 83, 0.2));
        }

        /* 하단 이동 버튼 스타일 */
        .bottom-nav {
            display: flex;
            justify-content: space-between;
            margin-top: 60px;
            gap: 20px;
        }

        .nav-btn {
            flex: 1;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            padding: 22px;
            border-radius: 20px;
            text-decoration: none;
            color: var(--text);
            font-weight: 700;
            text-align: center;
            transition: all 0.3s;
            display: none; /* JS에서 노출 제어 */
        }

        .nav-btn:hover {
            background: rgba(0, 200, 83, 0.1);
            border-color: var(--math-primary);
            transform: translateY(-5px);
        }

        /* 상단 고정 글로벌 메뉴 */
        .global-nav {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 10px;
        }

        .global-btn {
            background: rgba(13, 17, 23, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            padding: 10px 15px;
            border-radius: 12px;
            color: var(--text);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .global-btn:hover {
            background: var(--math-primary);
            color: #0d1117;
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .viewer-container { padding: 20px 15px; }
            .chapter-info h2 { font-size: 1.6rem; }
            .principle-card, .example-section { padding: 30px 20px; }
            .global-nav { top: 10px; right: 10px; }
        }

        .katex { color: var(--text) !important; }

        /* SVG 다이어그램 */
        .svg-diagram-box {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 28px 20px;
            margin: 30px 0;
            text-align: center;
        }
        .svg-diagram-box svg { max-width: 100%; height: auto; }
        .svg-diagram-caption {
            font-size: 0.82rem;
            color: var(--text-sub);
            margin-top: 12px;
        }

        /* 심화 학습 카드 */
        .deep-dive-card {
            background: linear-gradient(135deg, rgba(79,172,254,0.07), rgba(0,242,254,0.04));
            border: 1px solid rgba(79,172,254,0.35);
            border-radius: 28px;
            padding: 36px;
            margin-top: 36px;
        }
        .deep-dive-header {
            font-size: 1.2rem;
            font-weight: 800;
            color: #4facfe;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .deep-dive-content { display: flex; flex-direction: column; gap: 14px; }
        .deep-dive-item {
            font-size: 1rem;
            line-height: 1.7;
            color: var(--text-sub);
            padding-left: 16px;
            border-left: 3px solid rgba(79,172,254,0.5);
        }
        .deep-dive-example {
            background: rgba(255,255,255,0.04);
            border-radius: 16px;
            padding: 20px;
            margin-top: 16px;
            border: 1px solid rgba(79,172,254,0.2);
        }
        .deep-dive-example-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: #4facfe;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

    </style>
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="viewer-container">
        <header class="viewer-header">
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <a href="math.html" id="btnBackToTOC" class="btn-back" style="align-self: auto; margin-bottom: 0;">← 돌아가기</a>
                <nav style="display: flex; gap: 10px;">
                    <a href="index.html" class="global-btn">🏠 홈</a>
                    <a href="math.html" class="global-btn" id="mathHomeLink">📚 수학</a>
                </nav>
            </div>
            <div class="chapter-info" style="margin-top: 20px;">
                <p id="unitTitle">단원 정보</p>
                <h2 id="chapterTitle">소단원 제목</h2>
            </div>
        </header>

        <main id="viewerMain">
            <div class="principle-card">
                <div class="principle-header">💡 핵심 원리</div>
                <div class="principle-text" id="principleText">원리 내용이 여기에 표시됩니다.</div>
                
                <div id="explanationContainer" class="explanation-section"></div>

                <div id="conceptImageContainer" class="concept-image-box" style="display: none;">
                    <img src="" alt="개념 이미지" class="concept-image" id="conceptImg">
                </div>

                <!-- SVG 다이어그램 -->
                <div id="svgDiagramContainer" class="svg-diagram-box" style="display:none;">
                    <div id="svgDiagram"></div>
                    <div class="svg-diagram-caption" id="svgDiagramCaption"></div>
                </div>

                <div class="steps-container" id="stepsContainer"></div>
            </div>

            <!-- 심화 학습 -->
            <div id="deepDiveSection" class="deep-dive-card" style="display:none;">
                <div class="deep-dive-header">🚀 심화 학습</div>
                <div id="deepDiveContent" class="deep-dive-content"></div>
            </div>

            <div class="example-section" id="exampleSection">
                <div class="example-header">📝 실전 예제</div>
                <div class="example-problem" id="exampleProblem">문제가 여기에 표시됩니다.</div>
                <div id="solutionContainer" class="solution-list"></div>
            </div>

            <!-- 2. 하단 이전/다음 단원 이동 버튼 -->
            <div class="bottom-nav">
                <a href="#" id="prevBtn" class="nav-btn">◀ 이전 단원</a>
                <a href="#" id="nextBtn" class="nav-btn">다음 단원 ▶</a>
            </div>
        </main>
    </div>

    <script src="utils.js"></script>
    <script src="firebase-sync.js"></script>
    <script src="study-timer.js"></script>
    <script src="MathData.js?v=20260507-1855"></script>
    <script src="MathDataExtra.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof StudyTimer !== 'undefined') {
                const timerCtrl = StudyTimer.initBar('math', null);
                timerCtrl.startTimer();
                window.addEventListener('beforeunload', () => timerCtrl.stopTimer());
            }

            const params = new URLSearchParams(window.location.search);
            const levelId = params.get('level') || 'elementary-6';
            const semesterId = params.get('semester') || '1';
            const unitId = params.get('unit');
            const chapterId = params.get('chapter');

            if (!levelId || !unitId || !chapterId) {
                window.location.href = 'math.html';
                return;
            }

            // 수학 홈 링크 레벨 및 학기 유지
            document.getElementById('mathHomeLink').href = `math.html?level=${levelId}&semester=${semesterId}`;
            document.getElementById('btnBackToTOC').href = `math.html?level=${levelId}&semester=${semesterId}`;

            const levelData = MathData[levelId];
            if (!levelData) {
                alert('데이터를 찾을 수 없습니다.');
                window.location.href = 'math.html';
                return;
            }
            
            // 데이터 추출 로직 개선: 학기 정보가 틀려도 unitId로 전체 검색 시도
            let sourceUnits = levelData.semesters ? (levelData.semesters[semesterId] ? levelData.semesters[semesterId].units : []) : (levelData.units || []);
            let unit = sourceUnits.find(u => u.id === unitId);
            
            // 만약 못 찾았다면 모든 학기를 뒤져서 찾음 (URL 파라미터 누락 대응)
            if (!unit && levelData.semesters) {
                for (const sem in levelData.semesters) {
                    const found = levelData.semesters[sem].units.find(u => u.id === unitId);
                    if (found) {
                        unit = found;
                        break;
                    }
                }
            }

            if (!unit) {
                alert('해당 단원 정보를 찾을 수 없습니다.');
                window.location.href = 'math.html';
                return;
            }

            let chapter = unit.chapters.find(c => c.id === chapterId);

            if (!chapter) {
                alert('해당 소단원 정보를 찾을 수 없습니다.');
                window.location.href = 'math.html';
                return;
            }

            // MathDataExtra로 심화 콘텐츠 병합
            if (window.MathDataExtra && window.MathDataExtra[chapterId]) {
                chapter = Object.assign({}, chapter, window.MathDataExtra[chapterId]);
            }

            // 기본 정보 렌더링
            document.getElementById('unitTitle').innerText = unit.title;
            document.getElementById('chapterTitle').innerText = chapter.title;
            document.getElementById('principleText').innerHTML = renderMath(chapter.principle);

            // 상세 설명
            const expContainer = document.getElementById('explanationContainer');
            chapter.explanation.forEach(text => {
                const item = document.createElement('div');
                item.className = 'detail-item';
                item.innerHTML = `<div class="detail-bullet"></div><div>${renderMath(text)}</div>`;
                expContainer.appendChild(item);
            });

            // 이미지
            if (chapter.image) {
                const imgContainer = document.getElementById('conceptImageContainer');
                const img = document.getElementById('conceptImg');
                img.src = chapter.image;
                imgContainer.style.display = 'block';
            }

            // SVG 다이어그램
            if (chapter.svgDiagram) {
                const svgBox = document.getElementById('svgDiagramContainer');
                document.getElementById('svgDiagram').innerHTML = chapter.svgDiagram.svg || chapter.svgDiagram;
                if (chapter.svgDiagram.caption) {
                    document.getElementById('svgDiagramCaption').textContent = chapter.svgDiagram.caption;
                }
                svgBox.style.display = 'block';
            }

            // 심화 학습
            if (chapter.deepDive) {
                const sec = document.getElementById('deepDiveSection');
                const cont = document.getElementById('deepDiveContent');
                sec.style.display = 'block';
                (chapter.deepDive.content || []).forEach(text => {
                    const item = document.createElement('div');
                    item.className = 'deep-dive-item';
                    item.innerHTML = renderMath(text);
                    cont.appendChild(item);
                });
                (chapter.deepDive.examples || []).forEach((ex, i) => {
                    const box = document.createElement('div');
                    box.className = 'deep-dive-example';
                    let solHtml = '';
                    if (ex.solution) {
                        ex.solution.forEach(s => { solHtml += `<div style="color:var(--text-sub); margin-top:6px; font-size:0.95rem;">${renderMath(s)}</div>`; });
                    }
                    box.innerHTML = `
                        <div class="deep-dive-example-label">심화 예제 ${i + 1}</div>
                        <div style="font-weight:600; color:var(--text);">${renderMath(ex.problem)}</div>
                        ${solHtml}
                    `;
                    cont.appendChild(box);
                });
            }

            // 단계별 계산
            const stepsContainer = document.getElementById('stepsContainer');
            chapter.steps.forEach((step, idx) => {
                const box = document.createElement('div');
                box.className = 'step-box';
                box.innerHTML = `
                    <div class="step-num">${idx + 1}</div>
                    <div class="step-content">
                        <div style="color:var(--text); font-weight:600;">${step.text}</div>
                        <div class="step-formula" id="step-formula-${idx}"></div>
                    </div>
                `;
                stepsContainer.appendChild(box);
                if (step.formula) {
                    katex.render(step.formula, document.getElementById(`step-formula-${idx}`), { throwOnError: false });
                } else {
                    document.getElementById(`step-formula-${idx}`).style.display = 'none';
                }
            });

            // 예제
            document.getElementById('exampleProblem').innerHTML = renderMath(chapter.example.problem);
            const solContainer = document.getElementById('solutionContainer');
            const solutions = chapter.example.solution;
            let currentSolIdx = 0;

            // 풀이 보기 버튼 생성
            const viewSolBtn = document.createElement('button');
            viewSolBtn.className = 'btn-next-quiz'; // 기존 스타일 재활용
            viewSolBtn.style.display = 'block';
            viewSolBtn.style.marginTop = '20px';
            viewSolBtn.style.background = 'rgba(255, 255, 255, 0.1)';
            viewSolBtn.style.color = 'var(--math-primary)';
            viewSolBtn.style.border = '1px solid var(--math-primary)';
            viewSolBtn.innerText = '💡 단계별 풀이 보기';
            
            document.getElementById('exampleSection').appendChild(viewSolBtn);

            viewSolBtn.onclick = () => {
                if (currentSolIdx < solutions.length) {
                    const div = document.createElement('div');
                    div.className = 'solution-item';
                    div.style.animation = 'fadeInUp 0.4s ease-out';
                    div.innerHTML = renderMath(solutions[currentSolIdx]);
                    solContainer.appendChild(div);
                    currentSolIdx++;

                    if (currentSolIdx === solutions.length) {
                        viewSolBtn.style.display = 'none';
                    } else if (currentSolIdx === 1) {
                        viewSolBtn.innerText = '➡️ 다음 단계 보기';
                    }
                }
            };

            // 2.5 실전 예제 풀기 (Interactive Quizzes)
            if (chapter.quizzes && chapter.quizzes.length > 0) {
                const quizSection = document.createElement('div');
                quizSection.className = 'example-section';
                quizSection.style.marginTop = '40px';
                quizSection.style.borderTop = '2px solid var(--math-primary)';
                quizSection.innerHTML = `
                    <div class="example-header">🎯 실전 예제 풀기</div>
                    <div id="interactiveQuizContainer"></div>
                `;
                document.getElementById('viewerMain').insertBefore(quizSection, document.querySelector('.bottom-nav'));

                const quizContainer = document.getElementById('interactiveQuizContainer');
                chapter.quizzes.forEach((q, qIdx) => {
                    const qBox = document.createElement('div');
                    qBox.className = 'quiz-item';
                    qBox.style.marginBottom = '30px';
                    qBox.style.padding = '20px';
                    qBox.style.background = 'rgba(255,255,255,0.02)';
                    qBox.style.borderRadius = '20px';
                    qBox.style.border = '1px solid var(--card-border)';
                    
                    qBox.innerHTML = `
                        <div style="font-weight:700; margin-bottom:15px;">Q${qIdx + 1}. ${renderMath(q.question)}</div>
                        <div class="choices-grid" id="choices_${qIdx}" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div>
                        <div id="feedback_${qIdx}" style="margin-top:15px; padding:10px; border-radius:10px; display:none; font-size:0.9rem;"></div>
                    `;
                    quizContainer.appendChild(qBox);

                    const choicesGrid = document.getElementById(`choices_${qIdx}`);
                    q.choices.forEach((choice, cIdx) => {
                        const btn = document.createElement('button');
                        btn.className = 'global-btn';
                        btn.style.justifyContent = 'center';
                        btn.innerHTML = renderMath(choice);
                        btn.onclick = () => {
                            const feedback = document.getElementById(`feedback_${qIdx}`);
                            feedback.style.display = 'block';
                            if (cIdx === q.answer) {
                                feedback.style.background = 'rgba(0, 200, 83, 0.2)';
                                feedback.style.color = '#00c853';
                                feedback.innerHTML = `✅ **정답입니다!**<br>${renderMath(q.explanation)}`;
                                btn.style.background = 'var(--math-primary)';
                                btn.style.color = '#0d1117';
                            } else {
                                feedback.style.background = 'rgba(255, 82, 82, 0.2)';
                                feedback.style.color = '#ff5252';
                                feedback.innerHTML = `❌ **틀렸습니다.** 다시 생각해보세요!`;
                                btn.style.background = 'rgba(255, 82, 82, 0.3)';
                            }
                        };
                        choicesGrid.appendChild(btn);
                    });
                });
            }

            // 3. 이전/다음 버튼 로직 (학년 내 순환)
            setupNavigation(levelId, semesterId, unitId, chapterId, sourceUnits);

            function setupNavigation(levelId, semesterId, unitId, chapterId, units) {
                const allChapters = [];
                units.forEach(u => {
                    if (u.chapters && u.chapters.length > 0) {
                        u.chapters.forEach(c => {
                            allChapters.push({ unitId: u.id, unitTitle: u.title, chapterId: c.id, chapterTitle: c.title });
                        });
                    }
                });

                const currentIndex = allChapters.findIndex(c => c.unitId === unitId && c.chapterId === chapterId);
                console.log(`[Nav] Current Index: ${currentIndex} / Total: ${allChapters.length}`);

                const prevBtn = document.getElementById('prevBtn');
                const nextBtn = document.getElementById('nextBtn');

                if (currentIndex > 0) {
                    const prev = allChapters[currentIndex - 1];
                    prevBtn.href = `math_viewer.html?level=${levelId}&semester=${semesterId}&unit=${prev.unitId}&chapter=${prev.chapterId}`;
                    prevBtn.style.display = 'block';
                    prevBtn.innerHTML = `◀ 이전: ${prev.chapterTitle}`;
                } else {
                    prevBtn.style.display = 'none';
                }

                if (currentIndex >= 0 && currentIndex < allChapters.length - 1) {
                    const next = allChapters[currentIndex + 1];
                    nextBtn.href = `math_viewer.html?level=${levelId}&semester=${semesterId}&unit=${next.unitId}&chapter=${next.chapterId}`;
                    nextBtn.style.display = 'block';
                    nextBtn.innerHTML = `다음: ${next.chapterTitle} ▶`;
                } else {
                    nextBtn.style.display = 'none';
                }
            }

            function renderMath(text) {
                if (!text) return '';
                // 1. 볼드 처리 (**텍스트**)
                let processed = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                // 2. 수식 처리 ($수식$)
                return processed.replace(/\$(.*?)\$/g, (match, formula) => {
                    try {
                        return katex.renderToString(formula, { throwOnError: false });
                    } catch (e) { return formula; }
                });
            }
        });
    </script>

    <script>
        // Service Worker 등록 (PWA 오프라인 지원)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(reg => console.log('[SW] Registered:', reg.scope))
                    .catch(err => console.warn('[SW] Registration failed:', err));
            });
        }
    </script>
<script src="version-check.js"></script>
